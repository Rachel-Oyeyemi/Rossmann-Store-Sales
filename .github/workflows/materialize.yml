name: Materialize Portfolio Project

on:
  push:
    paths:
      - '.portfolio_build/**'
      - '.github/workflows/materialize.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Reconstruct project source
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import io
          import tarfile

          parts = sorted(Path('.portfolio_build').glob('part_*.txt'))
          if not parts:
              raise SystemExit('No source package parts found')
          encoded = ''.join(path.read_text(encoding='utf-8').strip() for path in parts)
          payload = base64.b64decode(encoded)
          with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
              archive.extractall('.')
          print(f'Extracted source from {len(parts)} package parts')
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forecasting pipeline
        run: python run_pipeline.py

      - name: Create compact sample data
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, 'src')
          from generate_demo_data import generate_demo

          output = Path('data/sample_data')
          output.mkdir(parents=True, exist_ok=True)
          train, stores = generate_demo(
              n_stores=20,
              start='2015-01-01',
              end='2015-04-30',
          )
          train.head(1200).to_csv(output / 'train_sample.csv', index=False)
          stores.to_csv(output / 'store_sample.csv', index=False)
          PY

      - name: Generate executive presentation
        run: python presentation/generate_presentation.py

      - name: Run tests
        run: pytest -q

      - name: Remove temporary and reproducible intermediates
        run: |
          rm -rf .portfolio_build
          rm -f .github/workflows/materialize.yml
          rm -rf data/processed/*
          rm -f models/evaluation_partitions.joblib
          rm -f reports/ridge_regression_*_predictions.csv
          rm -f reports/xgboost_*_predictions.csv
          rm -f visuals/*.png

      - name: Commit completed portfolio
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
          else
            git commit -m 'Build complete Rossmann sales forecasting portfolio'
            git push
          fi
