<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><rect width="900" height="500" fill="white"/><text x="450" y="42" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700">Average Sales by Promotion Status</text><line x1="110" y1="420" x2="850" y2="420" stroke="#1f2937" stroke-width="2"/><line x1="110" y1="80" x2="110" y2="420" stroke="#1f2937" stroke-width="2"/><rect x="220" y="205" width="200" height="215" rx="8" fill="#64748b"/><rect x="540" y="115" width="200" height="305" rx="8" fill="#16a34a"/><g font-family="Arial" text-anchor="middle"><text x="320" y="455" font-size="19">No Promotion</text><text x="640" y="455" font-size="19">Promotion</text><text x="320" y="190" font-size="20" font-weight="700">Lower average</text><text x="640" y="100" font-size="20" font-weight="700">Higher average</text></g><text x="450" y="485" text-anchor="middle" font-family="Arial" font-size="15" fill="#6b7280">Observed lift is descriptive, not causal</text></svg>